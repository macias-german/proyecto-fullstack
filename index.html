<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://placehold.co/30x30" type="image/x-icon">
</head>
<body>
    <header>
        <hgroup>
            <img src="https://placehold.co/30x30" alt="Logo de la aplicacion Character Counter.">
            <h2>Character Counter</h2>
        </hgroup>
        <button><img src="https://placehold.co/20x20" alt="Imagen del cambio de tema claro/oscuro."></button>
    </header>
    <section>
        <h1>Analyze your text in real-time.</h1>
        <textarea>Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>
        <div class="controls">
            <div class="checkbox">
                <input type="checkbox"><p>Exclude Spaces</p>
                <input type="checkbox"><p>Set Character Limit</p>
            </div>
            <p>Approx. reading time: &lt;1 minute</p>
        </div>
    </section>
</body>
</html>
